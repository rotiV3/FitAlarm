name: Build & Deploy

on:
  push:
    branches:
      - dev    # → Internal Testing track
      - main   # → Production track

# Required for Workload Identity Federation (no JSON key needed)
permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build signed AAB and deploy to Play Store
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Compute version from run number / git tag ──────────────────────
      - name: Set version
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          if [ "${{ github.ref_name }}" = "main" ]; then
            VERSION_NAME=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "1.0")
          else
            VERSION_NAME="0.${{ github.run_number }}-beta"
          fi
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      # ── 4. Decode keystore ────────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # ── 4b. Inject google-services.json ──────────────────────────────────
      #    Store the full JSON content as a GitHub secret named GOOGLE_SERVICES_JSON
      #    (copy-paste the entire file content into the secret value)
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # ── 5. Build release AAB ──────────────────────────────────────────────
      - name: Build release AAB
        env:
          MAPS_API_KEY:      ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID:     ${{ secrets.WEB_CLIENT_ID }}
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      # ── 6. Upload AAB as GitHub artifact ──────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitalarm-${{ steps.version.outputs.version_name }}-(${{ steps.version.outputs.version_code }}).aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 7. Authenticate with Google Cloud via Workload Identity Federation ─
      #    No JSON key required — uses short-lived OIDC token from GitHub
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file:    true   # writes a temp JSON file for the Play upload action

      # ── 8. Deploy to Internal Testing (dev branch) ────────────────────────
      - name: Deploy to Internal Testing
        if: github.ref_name == 'dev'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName:        com.rotiv3.fitalarm
          releaseFiles:       app/build/outputs/bundle/release/app-release.aab
          track:              internal
          status:             completed
          whatsNewDirectory:  distribution/whatsnew

      # ── 9. Deploy to Production (main branch) ─────────────────────────────
      - name: Deploy to Production
        if: github.ref_name == 'main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName:        com.rotiv3.fitalarm
          releaseFiles:       app/build/outputs/bundle/release/app-release.aab
          track:              production
          status:             completed
          whatsNewDirectory:  distribution/whatsnew
